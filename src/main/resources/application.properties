# Configuración del puerto del servidor (opcional, por defecto es 8080)
server.port=8080

# --- Configuración de la Base de Datos H2 ---
# URL de conexión a la base de datos en memoria llamada 'productdb'
spring.datasource.url=jdbc:h2:mem:productdb
# Driver de H2
spring.datasource.driverClassName=org.h2.database.Driver
# Usuario y contraseña para la base de datos H2
spring.datasource.username=sa
spring.datasource.password=

# --- Configuración de la Consola H2 ---
# Habilitamos la consola web de H2
spring.h2.console.enabled=true
# La ruta para acceder a la consola web (ej: http://localhost:8080/h2-console )
spring.h2.console.path=/h2-console

# --- Configuración de JPA (el ORM) ---
# Le decimos a JPA que el dialecto es H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Le decimos a Hibernate (la implementación de JPA) que cree/actualice las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
